<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A quiz webpage">
    <title>Quiz Page</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
        <img src="https://cdn.freecodecamp.org/platform/universal/fcc_primary.svg" id="logo" alt="freeCodeCamp">
        <h1>HTML/CSS Quiz</h1>
        <nav>
            <ul>
                <li><a href="#student-info">INFO</a></li>
                <li><a href="#html-questions">HTML</a></li>
                <li><a href="#css-questions">CSS</a></li>
            </ul>
        </nav>
    </header>
    <main>
      <form method="post" action="https://freecodecamp.org/practice-project/accessibility-quiz">
        <section role="region" aria-labelledby="student-info">
          <h2 id="student-info">Student Information</h2>
          <div class="info">
            <label for="name">Name :</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="info">
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="info">
            <label for="birth-date">Birth Date</label>
            <input type="date" id="birth-date" name="birth-date" required>
          </div>
        </section>
        <section role="region" aria-labelledby="html-questions">
          <h2 id="html-questions">HTML Questions</h2>
          <div class="question-block">
            <h3><span class="sr-only">Question</span>1</h3>
            <fieldset class="question" name="question1">
              <legend>The main purpose of the <dfn>header</dfn> element is to provide introductory content.</legend>
              <ul class="answers-list">
                <li>
                  <label for="q1-a1"><input type="radio" id="q1-a1" name="q1" value="true">True</label>
                </li>
                <li>
                  <label for="q1-a2"><input type="radio" id="q1-a2" name="q1" value="false">False</label>
                </li>
              </ul>
            </fieldset>
          </div>
          <div class="question-block">
            <h3><span class="sr-only">Question</span>2</h3>
            <fieldset class="question" name="question2">
              <legend>The main purpose of the <dfn>main</dfn> element is to hold the primary content of the document.</legend>
              <ul class="answers-list">
                <li>
                  <label for="q2-a1"><input type="radio" name="q2" id="q2-a1" value="true">True</label>
                </li>
                <li>
                  <label for="q2-a2"><input type="radio" name="q2" id="q2-a2" value="false">False</label>
                </li>
              </ul>
            </fieldset>
          </div>
        </section>
        <section role="region" aria-labelledby="css-questions">
          <h2 id="css-questions">CSS Questions</h2>
          <div class="formrow">
            <div class="question-block">
              <label>Can you describe the difference between a relative and absolute path?</label>
            </div>
            <div class="answer"></div>
            <div class="question-block">
              <label>Do you have any questions?</label>
            </div>
            <div class="answer"></div>
          </div>
        </section>
      </form>
    </main>
  </body>
</html>
